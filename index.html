<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H63BRO VPN — Личный кабинет</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #09090b; /* Ультра-черный */
            color: #f4f4f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #141417; /* Антрацит */
            border: 1px solid #27272a;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .logo-area {
            margin-bottom: 25px;
        }

        .logo-text {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        p {
            color: #a1a1aa;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .steps-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        /* Кнопки заданий */
        .btn-task {
            background: #18181b;
            color: #f4f4f5;
            border: 1px solid #27272a;
        }

        .btn-task:hover {
            background: #27272a;
            border-color: #3f3f46;
            transform: translateY(-1px);
        }

        /* Когда идет отсчет (кнопка временно выключена через CSS-класс) */
        .btn-task.waiting {
            background: #09090b !important;
            color: #71717a !important;
            border-color: #1c1c1f !important;
            pointer-events: none; /* Запрещает повторный клик */
            transform: none !important;
        }

        /* Выполненное задание */
        .btn-task.completed {
            background: rgba(34, 197, 94, 0.1) !important;
            color: #22c55e !important;
            border-color: rgba(34, 197, 94, 0.3) !important;
            pointer-events: none;
            transform: none !important;
        }

        /* Скрытая по умолчанию финальная кнопка */
        #finalAction {
            display: none;
            margin-top: 15px;
            background: #ffffff;
            color: #09090b;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
        }

        #finalAction:hover {
            background: #e4e4e7;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 255, 255, 0.25);
        }

        .footer-note {
            font-size: 12px;
            color: #52525b;
            line-height: 1.4;
            margin-top: 20px;
        }

        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-area">
        <div class="logo-text">H63BRO VPN</div>
    </div>
    
    <p id="mainInstruction">Выполните оба условия, чтобы разблокировать доступ к VPN. Кнопки запустят таймер проверки (30 сек).</p>

    <div class="steps-container">
        <a id="btnTask1" href="https://t.me/granitvpnbot?start=ref6628364739" target="_blank" class="btn btn-task" onclick="startTimer(1)">
            1. Пройти капчу в боте
        </a>

        <a id="btnTask2" href="https://t.me/h63bro" target="_blank" class="btn btn-task" onclick="startTimer(2)">
            2. Подписаться на канал
        </a>

        <a id="finalAction" href="https://gist.githubusercontent.com/bitmrazey-eng/8bf9fa0968bca4fb53c4cd2454155f27/raw/b4e6af4cea652fc6494cbd0adbc808129f8ce005/gistfile1.txt" target="_blank" class="btn">
            Получить VPN H63BRO
        </a>
    </div>

    <div class="footer-note" id="footerNote">
        Нажмите на кнопки по очереди. Ссылки откроются в Telegram, а на сайте начнется отсчет.
    </div>
</div>

<script>
    // Переменные состояния
    let task1Done = false;
    let task2Done = false;

    function startTimer(taskNumber) {
        const btn = document.getElementById(`btnTask${taskNumber}`);
        let timeLeft = 30;

        // Блокируем кнопку добавлением класса
        btn.classList.add('waiting');
        
        const countdown = setInterval(() => {
            btn.innerHTML = `Проверка... (${timeLeft} сек)`;
            timeLeft--;

            if (timeLeft < 0) {
                clearInterval(countdown);
                
                // Меняем внешний вид на выполненный
                btn.classList.remove('waiting');
                btn.classList.add('completed');
                btn.innerHTML = taskNumber === 1 ? "✓ Капча пройдена" : "✓ Канал проверен";
                
                if (taskNumber === 1) task1Done = true;
                if (taskNumber === 2) task2Done = true;

                // Проверяем, готовы ли обе кнопки
                checkFinalStatus();
            }
        }, 1000);
    }

    function checkFinalStatus() {
        if (task1Done && task2Done) {
            const finalBtn = document.getElementById('finalAction');
            const note = document.getElementById('footerNote');
            const instr = document.getElementById('mainInstruction');

            // Плавно показываем белую финальную кнопку
            finalBtn.style.display = 'flex';
            finalBtn.classList.add('fade-in');

            instr.innerHTML = "Все условия успешно выполнены!";
            note.innerHTML = "Доступ открыт. Кнопка получения VPN активирована.";
            note.style.color = '#22c55e'; // Зеленый текст успеха
        }
    }
</script>

</body>
</html>
